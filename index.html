<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en-GB">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" >
    <meta name="author" content="Jay Kint" >
    <meta name="description" content="Flagrant System Error" >
    <meta name="keywords" content="artifice, programming langauges, scheme, web development, programming, database, sql server" >
    <meta name="robots" content="index, follow" />
    <link rel="stylesheet" href="http://yui.yahooapis.com/pure/0.3.0/pure-min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <title>Flagrant System Error</title>
</head>
<body>

<div id="cover">Loading core dump...
    <div class="loading-spinner">
      <div class="rect1"></div>
      <div class="rect2"></div>
      <div class="rect3"></div>
      <div class="rect4"></div>
      <div class="rect5"></div>
    </div>
</div>

<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script src="http://desandro.github.io/imagesloaded/imagesloaded.pkgd.js"></script>
<script type="text/javascript">

var minLoadingWaitTime = 2400;	// in ms
var minPostWaitTime = 1000;

function set_credit_at_bottom()
{
    $("#footer").css("margin-top", Math.max( 100, $(window).height() - $("#header").height() - $("#content").height() - $("#credits").height()));
}

var windowLoaded = false;
var contentLoaded = false;

function set_codeblock_widths()
{
    // return if there are no codeblocks to set the width of
    if( $(".codeblock").length == 0 ) {
        return;
    }

    var paddingRight = $(".codeblock").css("padding-right");
    var paddingLeft = $(".codeblock").css("padding-left");
    paddingLeft = paddingLeft.substring(0,paddingLeft.length-2);
    paddingRight = paddingRight.substring(0,paddingRight.length-2);
    paddingLeft = parseInt(paddingLeft);
    paddingRigt = parseInt(paddingRight);
    
    // padding is left in innerWidth
    $(".codeblock").width($("#post").innerWidth() - paddingRight - paddingLeft);
}

function fade_out_cover() 
{
    if( windowLoaded && contentLoaded ) {
        $("#cover").fadeOut(500);
    }
}

function showPost()
{
	$("#postload").hide();
	$("#post").show();
	set_codeblock_widths();
	set_credit_at_bottom();
	$('html, body').scrollTop(0,0);
}

$(document).ready( function() {
    
	$(window).on('hashchange', function() {
		// show the spinner
		$("#post").hide();
		$("#postload").show();
		set_credit_at_bottom();

		// load the post
		var startTime = Date.now();
		$("#post").load(window.location.hash.substring(1)+".html", function() {
			$("#post").imagesLoaded( function() {

				var endTime = Date.now();
				if( minPostWaitTime - (endTime - startTime) < 0) {
					showPost();
				}
				else {
					setTimeout( 'showPost();', minPostWaitTime - (endTime - startTime));
				}
			});
		});
  	});
  
/*
	if( window.location.hash == "" ) {
		window.location.hash = "front";
	}
*/

	var startTime = Date.now();
	$("#post").load("front.html", function() {
	  $("#sidebar").load("sidebar.html", function() {
		$("#credits").load("credits.html", function() {
			set_codeblock_widths();
			set_credit_at_bottom();
			contentLoaded = true;
			var endTime = Date.now();
			if( minLoadingWaitTime - (endTime - startTime) < 0 ) {
				fade_out_cover();
			}
			else {
				setTimeout('fade_out_cover();', minLoadingWaitTime - (endTime - startTime));
			}
  		});
      });
	});
	
    $(window).on('load', function() {
        windowLoaded = true;
        fade_out_cover();
    });
});

</script>

<div class="middle">

<div id="header">
    <div class="pure-g">
    	<div class="pure-u-1"><img src="images/flagrant_system_error.png" width="100%"></div>
    </div>
</div>

<div id="content">
    <div class="pure-g">
        <div class="pure-u-1-5">
        	<div id="sidebar">
    	    </div>
        </div>
        <div class="pure-u-4-5">
        	<div id="post">
    	    </div>
    		<div id="postload">
    			<div class="spinner">
    			  <div class="spinner-container container1">
    			    <div class="circle1"></div>
    			    <div class="circle2"></div>
    			    <div class="circle3"></div>
    			    <div class="circle4"></div>
    			  </div>
    			  <div class="spinner-container container2">
    			    <div class="circle1"></div>
    			    <div class="circle2"></div>
    			    <div class="circle3"></div>
    			    <div class="circle4"></div>
    			  </div>
    			  <div class="spinner-container container3">
    			    <div class="circle1"></div>
    			    <div class="circle2"></div>
    			    <div class="circle3"></div>
    			    <div class="circle4"></div>
    			  </div>
    			</div>
    		</div>
        </div>
    </div>
</div>

<div id="footer">
    <div class="pure-g">
    	<div class="pure-u-1" id="credits">
    	</div>
    </div>
</div>

</div>

</body>
</html>
