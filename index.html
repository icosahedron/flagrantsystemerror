    <title>Flagrant System Error</title>
</head>
<body>

<div id="cover">Loading core dump...
    <div class="loading-spinner">
      <div class="rect1"></div>
      <div class="rect2"></div>
      <div class="rect3"></div>
      <div class="rect4"></div>
      <div class="rect5"></div>
    </div>
</div>

<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script src="http://desandro.github.io/imagesloaded/imagesloaded.pkgd.js"></script>
<script type="text/javascript">

var minLoadingWaitTime = 2400;    // in ms
var minPostWaitTime = 1000;

// taken from jquery site
function jq( myid ) 
{ 
    return "#" + myid.replace( /(:|\.|\[|\])/g, "\\$1" );
}

function splitUrlToHashes( url )
{
    var hashes = url.split("#");
    if( hashes.length > 3 )
    {
        throw "Too many hash marks: " + hashes.toString();
    }
    
    var hashName = hashes[1];
    var subHash = null;
    if( hashes.length == 3 )
    {
        subHash = hashes[2];
    }

    return { hash: hashName, subHash: subHash };
}

function set_credit_at_bottom()
{
    $("#footer").css("margin-top", Math.max( 100,
    $(window).height() - $("#header").outerHeight(true) - $("#content").outerHeight(true) - $("#credits").outerHeight(true)));
}

var windowLoaded = false;
var contentLoaded = false;

function set_codeblock_widths()
{
    // this is a legacy class we use because of a previous dependency on Pure 
    if( $(".codeblock").length != 0 )
    {
         var paddingRight = $(".codeblock").css("padding-right");
         var paddingLeft = $(".codeblock").css("padding-left");
         paddingLeft = paddingLeft.substring(0,paddingLeft.length-2);
         paddingRight = paddingRight.substring(0,paddingRight.length-2);
         paddingLeft = parseInt(paddingLeft);
         paddingRigt = parseInt(paddingRight);

         // padding is left in innerWidth
         $(".codeblock").width($("#post").innerWidth() - paddingRight - paddingLeft);
    }

    if( $("pre").length != 0 )
    {
        var paddingRight = $("pre").css("padding-right");
        var paddingLeft = $("pre").css("padding-left");
        paddingLeft = paddingLeft.substring(0,paddingLeft.length-2);
        paddingRight = paddingRight.substring(0,paddingRight.length-2);
        paddingLeft = parseInt(paddingLeft);
        paddingRigt = parseInt(paddingRight);

        // padding is left in innerWidth
        $("pre").width($("#post").innerWidth() - paddingRight - paddingLeft);
    }
}

function fade_out_cover( initialLink ) 
{
    if( windowLoaded && contentLoaded ) {
        $("#cover").fadeOut(500);
        
        if( initialLink != null )
        {
            console.log( typeof initialLink );
            moveToLink( initialLink );
        }
    }
}

function setupLinks()
{
    $("a").click(
        function(e)
        {
            // if this is an external link, do nothing
            if( $(this).context.host != window.location.host || $(this).context.href.substring(0,1) != "#")
            {
                return;
            }

            var anchor = $(this).context.hash;
            
            if($(this).hasClass("footnote") || $(this).hasClass("reversefootnote"))
            {
                var currentHash = splitUrlToHashes( window.location.hash );
                anchor = currentHash.hash + $(this).context.hash;
            }
            e.preventDefault();
            window.location.hash = anchor;
        });
}

function moveToLink( hash )
{
    console.log( hash );
    $('html, body').stop().animate({
        'scrollTop': $(jq(hash)).offset().top
    }, 900, 'swing');
}

function showPost(subHash)
{
    $("#postload").hide();
    $("#post").show();
    set_credit_at_bottom();
    $('html, body').scrollTop(0,0);
}

function showError(id, msg, xhr)
{
    $(id).html( msg + xhr.status + " " + xhr.statusText );
    return;
}

function loadPost( hashName, subHash )
{
    // show the spinner
    $("#post").hide();
    $("#postload").show();
    set_credit_at_bottom();

    // load the post
    var startTime = Date.now();
    $("#post").load(hashName+".html", function( response, status, xhr ) {

        if( status == "error" )
        {
            showError( "#post", "Sorry, the dice came up as: ",  xhr );
            showPost();
            return;
        }
        
        $("#post").imagesLoaded( function() {
            var endTime = Date.now();
            
            setupLinks();

            if( minPostWaitTime - (endTime - startTime) < 0) {
                showPost(subHash);
            }
            else {
                setTimeout( function f() { showPost( subHash ) }, minPostWaitTime - (endTime - startTime));
            }
        });
    });
}
  
$(document).ready( function() {

    var previousHash = null;

    $(window).on('hashchange', function() {
    
        var hashes = splitUrlToHashes( window.location.hash );
        
        console.log( previousHash );
        console.log( hashes.hash );
        console.log( hashes.subHash );
        if( hashes.hash == previousHash )
        {
            moveToLink( hashes.subHash );
        }
        else 
        {
            previousHash = hashes.hash;
            loadPost( hashes.hash, hashes.subHash );
        }   
      });

    if( window.location.hash == "" ) 
    {
        window.location.hash = "#front";    // does this cause the front to be loaded twice?
        previousHash = "front";
    }
    else 
    {
        previousHash = window.location.hash.substring(1);
    }

    var initialHash = splitUrlToHashes( window.location.hash );
    var startTime = Date.now();
    
    console.log( initialHash );

    $("#sidebar").load("sidebar.html", function( r, status, xhr ) {
    
        if( status == "error" )
        {
            showError( "#sidebar", "Sorry, no drinks at this sidebar: ", xhr );
        }
        
        $("#credits").load("credits.html", function( r, status, xhr ) {

            if( status == "error" )
            {
                showError( "#credits", "Sorry, no credit(s) for you: ", xhr );
            }
            
            $("#post").load(initialHash.hash + ".html", function( response, status, xhr ) {

                if( status == "error" )
                {
                    showError( "#post", "Sorry, the dice came up as: ", xhr );
                }
        
                setupLinks();
                set_credit_at_bottom();
                set_codeblock_widths();
                contentLoaded = true;
                var endTime = Date.now();
                if( minLoadingWaitTime - (endTime - startTime) <= 0 ) {
                    fade_out_cover( initialHash.subHash );
                }
                else {
                    setTimeout( function f() { fade_out_cover( initialHash.subHash ) }, minLoadingWaitTime - (endTime - startTime));
                }
            });
        });
    });
});

$(window).on('load', function() {

    windowLoaded = true;
    fade_out_cover();
});


</script>

<div id="middle">

<div id="header">
    <div class="grid">
        <div class="grid-col-1"><a href="#front"><img src="images/flagrant_system_error.png" width="100%"></a></div>
    </div>
</div>

<div id="content">
    <div class="grid">
        <div class="grid-col-1-5">
            <div id="sidebar">
            </div>
        </div>
        <div class="grid-col-4-5">
            <div id="post">
            </div>
            <div id="postload">
                <div class="spinner">
                  <div class="spinner-container container1">
                    <div class="circle1"></div>
                    <div class="circle2"></div>
                    <div class="circle3"></div>
                    <div class="circle4"></div>
                  </div>
                  <div class="spinner-container container2">
                    <div class="circle1"></div>
                    <div class="circle2"></div>
                    <div class="circle3"></div>
                    <div class="circle4"></div>
                  </div>
                  <div class="spinner-container container3">
                    <div class="circle1"></div>
                    <div class="circle2"></div>
                    <div class="circle3"></div>
                    <div class="circle4"></div>
                  </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="footer">
    <div class="grid">
        <div class="grid-col-1" id="credits">
        </div>
    </div>
</div>

</div>
