<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en-GB">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" >
    <meta name="author" content="Jay Kint" >
    <meta name="description" content="Flagrant System Error" >
    <meta name="keywords" content="artifice, programming langauges, scheme, web development, programming, database, sql server" >
    <meta name="robots" content="index, follow" />
    <link rel="stylesheet" href="http://yui.yahooapis.com/pure/0.3.0/pure-min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <title>Flagrant System Error</title>
</head>
<body>

<div id="cover">Loading core dump...</div>

<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script type="text/javascript">

function set_credit_at_bottom()
{
    $("#footer").css("margin-top", Math.max( 100, $(window).height() - $("#header").height() - $("#content").height() - $("#credits").height()));
}

var coverFaded = false;

function fade_in_cover() 
{
    if( !coverFaded ) {
        $("#cover").fadeOut(500);
    }
    coverFaded = true;
}

$(document).ready( function() {
    
	$(window).on('hashchange', function() {
	  	$("#post").load(window.location.hash.substring(1)+".html", function() {
	  	  set_credit_at_bottom();
 		  $('html, body').scrollTop(0,0);
	  	});
  	});
  
	if( window.location.hash == "" ) {
		window.location.hash = "front";
	}

	$("#post").load(window.location.hash.substring(1)+".html", function() {
	  $("#sidebar").load("sidebar.html", function() {
		$("#credits").load("credits.html", function() {
			set_credit_at_bottom();
			fade_in_cover();
  		});
      });
	});
	
    $(window).on('load', function() {
        fade_in_cover();
    });
});

</script>

<div class="middle">

<div id="header">
    <div class="pure-g">
    	<div class="pure-u-1"><img src="images/flagrant_system_error_banner.jpg" width="100%"></div>
    </div>
</div>

<div id="content">
    <div class="pure-g">
        <div class="pure-u-1-5">
        	<div id="sidebar">
    	    </div>
        </div>
        <div class="pure-u-4-5">
        	<div id="post">
    	    </div>
        </div>
    </div>
</div>

<div id="footer">
    <div class="pure-g">
    	<div class="pure-u-1" id="credits">
    	</div>
    </div>
</div>

</div>

</body>
</html>
